<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta property="og:title" content="Basketball Scoreboard">
        <meta property="og:description" content="Interactive basketball scoreboard application for tracking game scores between home and guest teams. Features real-time score updates with +1, +2, and +3 point buttons for each team.">
        <meta property="og:image" content="./images/basketball-scoreboard.jpg">
        <meta property="og:image:secure_url" content="./images/basketball-scoreboard.jpg">
        <meta property="og:image:type" content="image/jpeg">
        <meta property="og:image:width" content="1200">
        <meta property="og:image:height" content="630">
        <meta property="og:type" content="website">
        <meta name="author" content="Andreas">
        <meta property="article:author" content="Andreas">
        <meta property="article:published_time" content="2026-03-19T15:06:00+02:00">
        <link rel="stylesheet" href="index.css">
        <link href="https://db.onlinewebfonts.com/c/ab0e848e0e83a85a5af69f5acf1ebe73?family=Cursed+Timer+ULiL" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <div class="score-section">
                <h3 class="board-title-home">HOME</h3>
                <p id="home-score" class="score">0</p>
                <div class="button-group">
                    <button id="home-1">+1</button>
                    <button id="home-2">+2</button>
                    <button id="home-3">+3</button>
                </div>
            </div>
            <button id="reset" onclick="reset()">New Game</button>
            <div class="score-section">
                <h3 class="board-title-home">GUEST</h3>
                <p id="guest-score" class="score">0</p>
                <div class="button-group">
                    <button id="guest-1">+1</button>
                    <button id="guest-2">+2</button>
                    <button id="guest-3">+3</button>
                </div>
            </div>
        </div>
        <script type="module" src="index.js"></script>
    </body>
</html>
