<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="index.css">
        <link href="https://db.onlinewebfonts.com/c/ab0e848e0e83a85a5af69f5acf1ebe73?family=Cursed+Timer+ULiL" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <div class="score-section">
                <h3 class="board-title-home">HOME</h3>
                <p id="home-score" class="score">0</p>
                <div class="button-group">
                    <button id="home-1">+1</button>
                    <button id="home-2">+2</button>
                    <button id="home-3">+3</button>
                </div>
            </div>
            <button id="reset" onclick="reset()">New Game</button>
            <div class="score-section">
                <h3 class="board-title-home">GUEST</h3>
                <p id="guest-score" class="score">0</p>
                <div class="button-group">
                    <button id="guest-1">+1</button>
                    <button id="guest-2">+2</button>
                    <button id="guest-3">+3</button>
                </div>
            </div>
        </div>
        <script type="module" src="index.js"></script>
    </body>
</html>
